<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>

    <title>{% block title %}{% endblock %}</title>
</head>

<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm sticky-top">
    <div class="container">

        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            <i class="bi bi-check2-square text-primary"></i>
            TaskManager
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto ms-4">
                <li class="nav-item">
                    <a class="nav-link active" href="{% url 'home' %}">
                        <i class="bi bi-house-door me-1"></i> Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-list-task me-1"></i> Tasks
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'create_task' %}">
                        <i class="bi bi-plus-circle me-1"></i> New Task
                    </a>
                </li>
            </ul>

            <form class="d-flex me-3" role="search">
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="bi bi-search"></i>
                    </span>
                    <input class="form-control" type="search" placeholder="Search tasks...">
                </div>
            </form>

            <div class="dropdown">
                <button class="btn btn-light border dropdown-toggle"
                        data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    {{ user.username }}
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow">

                    {% if has_profile %}
                    <li>
                        <a class="dropdown-item" href="{% url 'profile' profile.id %}">
                            <i class="bi bi-person me-2"></i>
                            View Profile
                        </a>
                    </li>
                    {% else %}
                    <li>
                        <a class="dropdown-item" href="{% url 'profile_pic' %}">
                            <i class="bi bi-person me-2"></i>
                            Create Profile
                        </a>
                    </li>
                    {% endif %}

                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-key me-2"></i>
                            Change Password
                        </a>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    {% if user.is_authenticated %}
                    <li>
                        <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>
                    {% endif %}

                </ul>
            </div>

        </div>
    </div>
</nav>

{% block content %}
{% endblock %}

</body>
</html>
