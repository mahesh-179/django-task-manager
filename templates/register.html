{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill display-3 text-primary"></i>
                        <h2 class="fw-bold mt-3">Create Account</h2>
                        <p class="text-muted">Register to start managing your tasks.</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                Username
                            </label>
                            <input
                                type="text"
                                class="form-control"
                                id="username"
                                name="username"
                                placeholder="Enter username"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">
                                Email
                            </label>
                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                name="email"
                                placeholder="Enter email">
                        </div>

                        <div class="mb-3">
                            <label for="password1" class="form-label fw-semibold">
                                Password
                            </label>
                            <input
                                type="password"
                                class="form-control"
                                id="password1"
                                name="password1"
                                placeholder="Enter password"
                                required>
                        </div>

                        <div class="mb-4">
                            <label for="password2" class="form-label fw-semibold">
                                Confirm Password
                            </label>
                            <input
                                type="password"
                                class="form-control"
                                id="password2"
                                name="password2"
                                placeholder="Confirm password"
                                required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-person-plus-fill me-2"></i>
                                Create Account
                            </button>
                        </div>

                    </form>

                    <hr class="my-4">

                    <p class="text-center mb-0">
                        Already have an account?
                        <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">
                            Login
                        </a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
